<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
        
</head>
<body>
    <h2>💰 Currency Converter</h2>
<p style="text-align:center;margin-bottom:20px;color:gray;">
Login to continue
</p>
    <form id="loginForm">

    <h2>Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

    <p id="error"></p>

</form>
<script src="login.js"></script>
    
</body>
</html>
