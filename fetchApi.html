<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo">Fetch a URL...</p>
    <script>
        // 1. A function that simulates a time-consuming network request
    function fetchUserData() {
        return new Promise((resolve) => {
            setTimeout(() => {
                resolve({ id: 1, name: "Alice" });
            }, 2000); // Simulates a 2-second delay
        });
    }

// 2. Using async/await to handle the asynchronous function cleanly
    async function displayUser() {
        console.log("Fetching user data... Please wait.");

        // The code PAUSES here for 2 seconds until fetchUserData resolves
        const user = await fetchUserData();

        // This line runs only AFTER the data arrives
        console.log(`Success! User found: ${user.name}`);
    }

    // 3. Run the function
    displayUser();
    </script>
</body>
</html>
