<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <script>
    function printValue()
    {
        document.getElementById("mypara").innerText="<span>ok</span>"
        document.getElementById("mypara2").innerText="<span>ok</span>"
    }
    
    </script>
</head>
<body onload="printValue()">
    <p id="mypara">this is first paragraph</p>
    <p id="mypara2">this is second paragraph</p>
    
</body>
</html>
